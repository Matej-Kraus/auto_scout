name: ci

# Lint + testy na kazdy push/PR. Tydenni cron navic drzi repo "aktivni",
# aby GitHub po 60 dnech nevypnul scheduled workflow hunt.yml (CLAUDE.md §8.2).
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # pondeli 06:00 UTC — heartbeat

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check app tests scripts
      - name: Pytest
        run: pytest -q
